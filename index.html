<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synera: Synergy Auto-Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d0d1a;
        }
        #screen {
            width: 800px; height: 600px;
            position: absolute;
            transform-origin: 0 0;
        }
        #screen canvas { display: block; outline: none; }
        #qtspinner {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: #0d0d1a; color: #c0c0d0;
            z-index: 1000;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .spinner-ring {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #64b5f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 18px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #qtstatus { font-size: 14px; margin-top: 6px; opacity: 0.6; }
    </style>
</head>
<body onload="init()">

<figure id="qtspinner">
    <div class="spinner-ring"></div>
    <strong>Synera 加载中…</strong>
    <div id="qtstatus"></div>
</figure>

<div id="screen"></div>

<script src="SyneraPhase1.js"></script>
<script src="qtloader.js"></script>

<script>
    var GAME_W = 800, GAME_H = 600;

    function layout() {
        var s = document.getElementById('screen');
        var vw = window.innerWidth, vh = window.innerHeight;
        var scale = Math.min(vw / GAME_W, vh / GAME_H);
        s.style.transform = 'translate('
            + ((vw - GAME_W * scale) / 2) + 'px,'
            + ((vh - GAME_H * scale) / 2) + 'px) scale(' + scale + ')';
    }
    window.addEventListener('resize', layout);

    async function init() {
        var spinner = document.getElementById('qtspinner');
        var screen  = document.getElementById('screen');
        var status  = document.getElementById('qtstatus');

        layout();
        spinner.style.display = 'flex';
        status.textContent = '加载中…';

        try {
            await qtLoad({
                qt: {
                    containerElements: [screen],
                    onLoaded: function() {
                        spinner.style.display = 'none';
                        screen.style.display = 'block';
                        layout();  // re-center after Qt creates canvas
                    },
                    onExit: function(d) {
                        status.textContent = '已退出' + (d.text ? ': ' + d.text : '');
                        spinner.style.display = 'flex';
                    },
                    entryFunction: window.SyneraPhase1_entry
                }
            });
        } catch (e) {
            status.textContent = '加载失败，请刷新重试';
            console.error(e);
        }
    }
</script>
</body>
</html>
